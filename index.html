<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Слова Пацана: АЛФАВИТНЫЙ БАТТЛ</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; font-family: monospace; color: #fff; }
        #game-container { width: 100%; height: 100%; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDD2ftVwjo9qFEdGegZi6HY06USWmb9j60",
            authDomain: "slovopacana-10148.firebaseapp.com",
            databaseURL: "https://slovopacana-10148-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "slovopacana-10148",
            storageBucket: "slovopacana-10148.firebasestorage.app",
            messagingSenderId: "675130644209",
            appId: "1:675130644209:web:eb0c004521316d9c9cfb50"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const playerId = Math.random().toString(36).substring(7);

        let BASE_WORDS = new Set();
        let SLANG_WORDS = new Set();
        let MEME_WORDS = new Set();

        const COLOR_SELF = 0x3b82f6; 
        const COLOR_OPP = 0xff4444;  
        const WIN_SCORE = 2000;

        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            preload() { 
                this.load.image('bg', 'https://rosebud.ai/assets/concrete-wall.webp?wHr0');
                this.load.text('baseTxt', 'russian.txt');
                this.load.text('slangTxt', 'slang.txt');
                this.load.text('memesTxt', 'memes.txt');
                this.load.audio('click', 'https://labs.phaser.io/assets/audio/SoundEffects/key.wav');
                this.load.audio('capture', 'https://labs.phaser.io/assets/audio/SoundEffects/magic.wav');
            }
            create() {
                const normalize = (word) => word.toUpperCase().trim().replace(/Ё/g, 'Е');
                const parse = (key) => {
                    const txt = this.cache.text.get(key);
                    return txt ? txt.split(/[\s,]+/).map(normalize).filter(w => w.length > 0) : [];
                };
                BASE_WORDS = new Set(parse('baseTxt'));
                SLANG_WORDS = new Set(parse('slangTxt'));
                MEME_WORDS = new Set(parse('memesTxt'));

                this.add.image(540, 960, 'bg').setAlpha(0.3).setDisplaySize(1080, 1920);
                this.add.text(540, 400, 'СЛОВА\nПАЦАНА', { fontSize: '130px', fill: '#fff', align: 'center', fontStyle: 'bold' }).setOrigin(0.5);
                
                const r = this.add.rectangle(540, 960, 800, 180, 0x3b82f6, 0.8).setInteractive();
                this.add.text(540, 960, 'ЗАХВАТ ПОЛЯ', { fontSize: '60px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
                r.on('pointerdown', () => this.scene.start('MainScene'));
            }
        }

        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }
            init() { 
                this.roomPath = 'rooms/battle_territory'; 
                this.gridCreated = false;
                this.isGameOver = false;
                this.tileImages = [];
                this.tilesOwner = {}; 
                this.usedWords = new Set();
            }
            preload() {
                this.load.image('bg', 'https://rosebud.ai/assets/concrete-wall.webp?wHr0');
                this.load.image('tile', 'https://rosebud.ai


/assets/stone-tile.webp?Nl9W');
            }
            create() {
                this.add.image(540, 960, 'bg').setAlpha(0.15).setDisplaySize(1080, 1920);
                
                this.score = 0; this.oppScore = 0; this.currentWord = ""; this.selectedTiles = [];
                this.scoreText = this.add.text(50, 80, 'АВТОРИТЕТ: 0', { fontSize: '45px', fill: '#facc15', fontStyle: 'bold' });
                this.oppScoreText = this.add.text(50, 150, 'СОПЕРНИК: 0', { fontSize: '40px', fill: '#ff4444' });
                this.wordDisplay = this.add.text(540, 350, '', { fontSize: '85px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 10 }).setOrigin(0.5);

                const sub = this.add.rectangle(540, 1650, 800, 160, 0x00ff00, 0.5).setInteractive();
                this.add.text(540, 1650, 'ЗАХВАТИТЬ', { fontSize: '60px', fontStyle: 'bold' }).setOrigin(0.5);
                sub.on('pointerdown', () => this.checkWord());

                this.syncMultiplayer();
            }

            syncMultiplayer() {
                const roomRef = database.ref(this.roomPath);
                roomRef.child('grid').on('value', (snap) => {
                    const val = snap.val();
                    if (!val && !this.gridCreated) {
                        roomRef.child('grid').set(this.generateAlphabetGrid());
                    } else if (val && !this.gridCreated) {
                        this.createGridFromLetters(val);
                        this.gridCreated = true;
                    }
                });

                roomRef.child('ownership').on('value', (snap) => {
                    this.tilesOwner = snap.val() || {};
                    this.updateTileVisuals();
                });

                database.ref(`${this.roomPath}/players/${playerId}`).update({ score: 0, selections: [] });
                roomRef.child('players').on('value', (snap) => {
                    const data = snap.val();
                    if (!data) return;
                    for (let id in data) {
                        if (id === playerId) {
                            this.score = data[id].score || 0;
                            this.scoreText.setText(`АВТОРИТЕТ: ${this.score}`);
                        } else {
                            this.oppScore = data[id].score || 0;
                            this.oppScoreText.setText(`СОПЕРНИК: ${this.oppScore}`);
                            this.showOpponentProgress(data[id].selections || []);
                        }
                    }
                    if (this.score >= WIN_SCORE) this.endGame(playerId);
                });
            }

            generateAlphabetGrid() {
                // 32 буквы (без Ё для ровного счета 64)
                const alphabet = "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";
                let letters = (alphabet + alphabet).split('');
                
                // Перемешивание (Фишер-Йетс)
                for (let i = letters.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [letters[i], letters[j]] = [letters[j], letters[i]];
                }
                return letters.join('');
            }

            createGridFromLetters(str) {
                this.tileImages = [];
                for (let i = 0; i < 64; i++) {
                    let r = Math.floor(i / 8), c = i % 8;
                    let x = 120 + c * 115, y = 500 + r * 115;
                    let t = this.add.image(x, y, 'tile').setDisplaySize(105, 105).setInteractive();
                    t.setData('index', i);
                    this.tileImages[i] = t;
                    this.add.text(x, y, str[i], { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
                    t.on('pointerdown', () => this.handleTileClick(t, str[i]));
                }
            }

            handleTileClick(tile, letter) {
                if (this.isGameOver) return;
                const idx = this.selec


tedTiles.indexOf(tile);
                this.sound.play('click', { volume: 0.4 });

                if (idx === -1) {
                    this.currentWord += letter;
                    tile.setTint(0x00ffff); 
                    this.selectedTiles.push(tile);
                    this.tweens.add({ targets: tile, scale: 1.1, duration: 50, yoyo: true });
                } else if (idx === this.selectedTiles.length - 1) {
                    const owner = this.tilesOwner[tile.getData('index')];
                    if (owner === playerId) tile.setTint(COLOR_SELF);
                    else if (owner) tile.setTint(COLOR_OPP);
                    else tile.clearTint();
                    this.selectedTiles.pop();
                    this.currentWord = this.currentWord.slice(0, -1);
                }
                this.wordDisplay.setText(this.currentWord);
                database.ref(`${this.roomPath}/players/${playerId}/selections`).set(this.selectedTiles.map(t => t.getData('index')));
            }

            checkWord() {
                if (this.isGameOver || this.currentWord.length < 2) return;
                const w = this.currentWord.toUpperCase().replace(/Ё/g, 'Е');
                if (this.usedWords.has(w)) { this.flashText("БЫЛО!", "#ff9900"); return; }

                let stealBonus = 1;
                const currentIndices = this.selectedTiles.map(t => t.getData('index'));
                currentIndices.forEach(idx => {
                    if (this.tilesOwner[idx] && this.tilesOwner[idx] !== playerId) stealBonus = 2;
                });

                let typeMult = 1;
                if (MEME_WORDS.has(w)) typeMult = 3;
                else if (SLANG_WORDS.has(w)) typeMult = 2;
                else if (!BASE_WORDS.has(w)) { this.flashText("НЕТ В БАЗЕ", "#ff0000"); this.resetSelection(); return; }

                this.sound.play('capture', { volume: 0.5 });
                this.usedWords.add(w);
                const totalMult = typeMult * stealBonus;
                const points = w.length * 100 * totalMult;
                
                const newOwnership = {...this.tilesOwner};
                currentIndices.forEach(idx => { newOwnership[idx] = playerId; });
                
                database.ref(`${this.roomPath}/ownership`).set(newOwnership);
                database.ref(`${this.roomPath}/players/${playerId}`).update({ score: this.score + points, selections: [] });
                
                this.flashText(totalMult > 1 ? `ПЕРЕХВАТ x${totalMult}! +${points}` : `+${points}`, "#00ff00");
                this.resetSelection();
            }

            updateTileVisuals() {
                if (!this.tileImages.length) return;
                for (let i = 0; i < 64; i++) {
                    const owner = this.tilesOwner[i];
                    const tile = this.tileImages[i];
                    if (!this.selectedTiles.includes(tile)) {
                        if (owner === playerId) tile.setTint(COLOR_SELF);
                        else if (owner) tile.setTint(COLOR_OPP);
                        else tile.clearTint();
                    }
                }
            }

            showOpponentProgress(indices) {
                indices.forEach(idx => {
                    if (this.tileImages[idx]) this.tileImages[idx].setTint(0x555555);
                });
            }

            endGame(winnerId) {
                this.isGameOver = true;
                const isWin = winnerId === playerId;
                const msg = isWin ? "ТВОЯ ТЕРРИТОРИЯ!" : "ТЕБЯ ВЫТЕСНИЛИ...";
                this.add.rectangle(540, 960, 1000, 500, 0x000000, 0.95);
                this.add.text(540, 900, msg, { fontSize: '80px', fill: isWin ? '#00ff00' : '#ff0000' }).setOrigin(0.5);
                const b = this.add.text(540, 1100, 'В МЕНЮ', { fontSize: '60px', fill: '#facc15' }).setOrigin(0.5).setInteractive();
                b.on('pointerdown', () => {
                    database.ref(this.roomPath).remove


().then(() => {
                        this.scene.start('MenuScene');
                    });
                });
            }

            resetSelection() {
                this.currentWord = ""; this.wordDisplay.setText("");
                this.selectedTiles = [];
                this.updateTileVisuals();
                database.ref(`${this.roomPath}/players/${playerId}/selections`).set([]);
            }

            flashText(m, c) {
                const t = this.add.text(540, 450, m, { fontSize: '50px', fill: c, fontStyle: 'bold' }).setOrigin(0.5);
                this.tweens.add({ targets: t, alpha: 0, y: 300, duration: 2000 });
            }
        }

        new Phaser.Game({ type: Phaser.AUTO, parent: 'game-container', width: 1080, height: 1920, scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, audio: { disableWebAudio: false }, scene: [MenuScene, MainScene] });
    </script>
</body>
</html>

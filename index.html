<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ТЕСТ ЗАПУСКА</title>
    <style>
        body { margin: 0; background: #222; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.70.0/phaser.min.js"></script>
</head>
<body>
    <div id="game"></div>
    <script>
        class TestScene extends Phaser.Scene {
            constructor() { super('TestScene'); }
            create() {
                this.add.text(540, 960, 'ДВИЖОК РАБОТАЕТ!\nНАЖМИ ЭКРАН', { 
                    fontSize: '60px', 
                    fill: '#00ff00', 
                    align: 'center' 
                }).setOrigin(0.5);

                this.input.on('pointerdown', () => {
                    alert('Нажатие работает! Значит, проблема была в загрузке внешних файлов.');
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game',
            width: 1080,
            height: 1920,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: TestScene
        };

        new Phaser.Game(config);
    </script>
</body>
</html>

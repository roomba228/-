<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Слова Пацана: Битва</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.70.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <script>
        // --- ТУТ ТВОЯ МЕГА БАЗА СЛОВ (Вставь сюда массивы INSULTS и WORDS_ARRAY из прошлого кода) ---
        const INSULTS = new Set(["ЛОХ", "ЧУШПАН", "КРЫСА", "ШНЫРЬ", "ТРУС", "ХАМ", "ДУРАК"]);
        const WORDS_ARRAY = ["АД", "АКТ", "БАЛ", "БРАТ", "ГОД", "ДОМ", "ИГРА", "КОТ"]; 
        const ALL_WORDS = new Set([...INSULTS, ...WORDS_ARRAY]);

        const CONFIG = {
            gridSize: 8,
            tileSize: 105,
            margin: 10,
            assets: {
                bg: 'https://rosebud.ai/assets/concrete-wall.webp?wHr0',
                tile: 'https://rosebud.ai/assets/stone-tile.webp?Nl9W',
                bgm: 'https://rosebud.ai/assets/Nebula_Dreams.mp3?qN4h'
            }
        };

        // --- СЦЕНА 1: ГЛАВНОЕ МЕНЮ ---
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            
            preload() {
                this.load.image('bg', CONFIG.assets.bg);
            }

            create() {
                const bg = this.add.image(540, 960, 'bg').setAlpha(0.3).setDisplaySize(1080, 1920);

                // Заголовок
                this.add.text(540, 300, 'СЛОВА\nПАЦАНА', { fontFamily: 'monospace', fontSize: '80px', fill: '#ffffff', align: 'center', fontStyle: 'bold' }).setOrigin(0.5);

                // Текущее звание игрока
                this.add.text(540, 550, 'ТВОЙ СТАТУС:\nСКОРЛУПА', { fontFamily: 'monospace', fontSize: '45px', fill: '#facc15', align: 'center', fontStyle: 'bold' }).setOrigin(0.5);

                // Кнопка: РЕЙТИНГОВАЯ ИГРА
                const btnRanked = this.add.container(540, 850);
                const bgRanked = this.add.rectangle(0, 0, 800, 140, 0xff0000, 0.8).setInteractive();
                const txtRanked = this.add.text(0, 0, 'РЕЙТИНГОВАЯ ИГРА', { fontFamily: 'monospace', fontSize: '45px', fill: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5);
                btnRanked.add([bgRanked, txtRanked]);

                bgRanked.on('pointerdown', () => {
                    bgRanked.setAlpha(0.5);
                    this.scene.start('MainScene', { mode: 'РАЗБОРКА ЗА РЕЙТИНГ' });
                });
                bgRanked.on('pointerup', () => bgRanked.setAlpha(0.8));

                // Кнопка: БЫСТРАЯ ИГРА
                const btnQuick = this.add.container(540, 1050);
                const bgQuick = this.add.rectangle(0, 0, 800, 140, 0x3b82f6, 0.8).setInteractive();
                const txtQuick = this.add.text(0, 0, 'БЫСТРАЯ ИГРА', { fontFamily: 'monospace', fontSize: '45px', fill: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5);
                btnQuick.add([bgQuick, txtQuick]);

                bgQuick.on('pointerdown', () => {
                    bgQuick.setAlpha(0.5);
                    this.scene.start('MainScene', { mode: 'СЛУЧАЙНЫЙ ЗАМЕС' });
                });
                bgQuick.on('pointerup', () => bgQuick.setAlpha(0.8));
            }
        }

        // --- СЦЕНА 2: САМА ИГРА ---
        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }
            
            init(data) {
                // Получаем режим игры из меню
                this.gameMode = data.mode;
            }

            preload() {
                this.load.image('bg', CONFIG.assets.bg);
                this.load.image('tile', CONFIG.assets.tile);
            }
            create() {
                this.add.image(540, 960, 'bg').setAlpha(0.3).setDisplaySize(1080, 1920);
                
                // Кнопка НАЗАД В МЕНЮ
                const backBtn = this.add.text(50, 50, '< НАЗАД', { fontFamily: 'monospace', fontSize: '40px', fill: '#fff', fontStyle: 'bold' }).setInteractive();
                backBtn.on('pointerdown', () => this.scene.start('MenuScene'));

                // Отображение режима
                this.add.text(540, 80, this.gameMode, { fontFamily: 'monospace', fontSize: '30px', fill: '#888', fontStyle: 'bold' }).setOrigin(0.5);

                this.currentWord = "";
                this.score = 0;
                this.selectedTiles = [];
                this.scoreText = this.add.text(540, 150, 'АВТОРИТЕТ: 0', { fontFamily: 'monospace', fontSize: '50px', fill: '#facc15', fontStyle: 'bold' }).setOrigin(0.5);
                this.wordDisplay = this.add.text(540, 300, 'ВЫБЕРИ СЛОВО', { fontFamily: 'monospace', fontSize: '55px', fill: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5);
                
                this.createGrid();
                
                const submitBtn = this.add.container(540, 1600);
                const btnBg = this.add.rectangle(0, 0, 800, 140, 0x00ff00, 0.4).setInteractive();
                const btnText = this.add.text(0, 0, 'ОТВЕТИТЬ ЗА БАЗАР', { fontFamily: 'monospace', fontSize: '45px', fill: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5);
                submitBtn.add([btnBg, btnText]);
                
                btnBg.on('pointerdown', () => { btnBg.setAlpha(0.8); this.checkWord(); });
                btnBg.on('pointerup', () => btnBg.setAlpha(0.4));
            }
            
            createGrid() {
                const totalSize = CONFIG.gridSize * (CONFIG.tileSize + CONFIG.margin);
                const startX = (1080 - totalSize) / 2 + CONFIG.tileSize/2;
                const startY = 500;
                const alphabet = "АААБВВГДДЕЕЕЖЗИИИККЛЛММНННОООПРРСССТТТУУФХЦЧШЩЬЫЫЯЯ";
                for (let r = 0; r < CONFIG.gridSize; r++) {
                    for (let c = 0; c < CONFIG.gridSize; c++) {
                        const letter = alphabet[Math.floor(Math.random() * alphabet.length)];
                        const x = startX + c * (CONFIG.tileSize + CONFIG.margin);
                        const y = startY + r * (CONFIG.tileSize + CONFIG.margin);
                        const tile = this.add.image(x, y, 'tile').setDisplaySize(CONFIG.tileSize, CONFIG.tileSize).setInteractive();
                        const txt = this.add.text(x, y, letter, { fontFamily: 'monospace', fontSize: '45px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
                        tile.on('pointerdown', () => {
                            if (this.selectedTiles.includes(tile)) return;
                            this.currentWord += letter;
                            this.wordDisplay.setText(this.currentWord);
                            tile.setTint(0x3b82f6);
                            this.selectedTiles.push(tile);
                            this.cameras.main.shake(50, 0.003);
                        });
                    }
                }
            }
            checkWord() {
                const word = this.currentWord.toUpperCase();
                if (ALL_WORDS.has(word)) {
                    let gain = word.length * 100;
                    if (INSULTS.has(word)) { gain *= 2; this.flashText("БАЗАР ПРИНЯТ! +X2", "#ff0000"); } 
                    else { this.flashText("ЕСТЬ ТАКОЕ СЛОВО", "#00ff00"); }
                    this.score += gain;
                    this.scoreText.setText(`АВТОРИТЕТ: ${this.score}`);
                } else {
                    this.flashText("НЕТ ТАКОГО СЛОВА", "#ffffff");
                }
                this.currentWord = ""; this.wordDisplay.setText("");
                this.selectedTiles.forEach(t => t.clearTint());
                this.selectedTiles = [];
            }
            flashText(msg, color) {
                const t = this.add.text(540, 400, msg, { fontFamily: 'monospace', fontSize: '40px', fill: color, fontStyle: 'bold' }).setOrigin(0.5);
                this.tweens.add({ targets: t, y: 350, alpha: 0, duration: 2000, onComplete: () => t.destroy() });
            }
        }

        // Запускаем игру, первая сцена — Меню
        const phaserConfig = { 
            type: Phaser.AUTO, 
            parent: 'game-container', 
            width: 1080, 
            height: 1920, 
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, 
            scene: [MenuScene, MainScene] 
        };
        new Phaser.Game(phaserConfig);
    </script>
</body>
</html>

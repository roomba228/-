<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ТЕРРИТОРИЯ: ЧИСТЫЙ КОД</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; font-family: 'Courier New', Courier, monospace; color: #fff; }
        #game-container { width: 100%; height: 100%; border: 2px solid #333; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDD2ftVwjo9qFEdGegZi6HY06USWmb9j60",
            authDomain: "slovopacana-10148.firebaseapp.com",
            databaseURL: "https://slovopacana-10148-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "slovopacana-10148",
            storageBucket: "slovopacana-10148.firebasestorage.app",
            messagingSenderId: "675130644209",
            appId: "1:675130644209:web:eb0c004521316d9c9cfb50"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const playerId = Math.random().toString(36).substring(7);

        // Цвета (строгий стиль)
        const THEME = {
            bg: 0x0f172a,
            tile: 0x1e293b,
            self: 0x3b82f6,
            opp: 0xef4444,
            text: '#ffffff',
            accent: '#facc15'
        };

        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            create() {
                this.cameras.main.setBackgroundColor('#0f172a');
                this.add.text(540, 400, 'СЛОВА\nПАЦАНА', { fontSize: '120px', fill: '#fff', align: 'center', fontStyle: 'bold' }).setOrigin(0.5);
                
                const btn = this.add.rectangle(540, 960, 700, 150, 0x3b82f6).setInteractive();
                this.add.text(540, 960, 'ЗАХВАТ ПОЛЯ', { fontSize: '50px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
                
                btn.on('pointerdown', () => this.scene.start('MainScene'));
            }
        }

        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }
            init() { 
                this.roomPath = 'rooms/battle_territory'; 
                this.gridCreated = false;
                this.isGameOver = false;
                this.tileObjects = [];
                this.tilesOwner = {}; 
                this.usedWords = new Set();
                this.selectedIndices = [];
                this.currentWord = "";
            }

            create() {
                this.cameras.main.setBackgroundColor('#0f172a');
                
                // Интерфейс
                this.scoreText = this.add.text(50, 80, 'АВТОРИТЕТ: 0', { fontSize: '40px', fill: THEME.accent, fontStyle: 'bold' });
                this.oppScoreText = this.add.text(50, 140, 'СОПЕРНИК: 0', { fontSize: '35px', fill: '#ef4444' });
                this.wordDisplay = this.add.text(540, 300, '', { fontSize: '90px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);

                // Кнопка захвата
                const subBtn = this.add.rectangle(540, 1700, 800, 140, 0x22c55e).setInteractive();
                this.add.text(540, 1700, 'ВЗЯТЬ СВОЁ', { fontSize: '55px', fontStyle: 'bold' }).setOrigin(0.5);
                subBtn.on('pointerdown', () => this.checkWord());

                this.syncMultiplayer();
            }

            syncMultiplayer() {
                const roomRef = database.ref(this.roomPath);
                
                roomRef.child('grid'


).on('value', (snap) => {
                    const val = snap.val();
                    if (!val && !this.gridCreated) {
                        roomRef.child('grid').set(this.generateAlphabetGrid());
                    } else if (val && !this.gridCreated) {
                        this.createGrid(val);
                        this.gridCreated = true;
                    }
                });

                roomRef.child('ownership').on('value', (snap) => {
                    this.tilesOwner = snap.val() || {};
                    this.updateVisuals();
                });

                database.ref(`${this.roomPath}/players/${playerId}`).update({ score: 0 });
                roomRef.child('players').on('value', (snap) => {
                    const data = snap.val();
                    if (!data) return;
                    for (let id in data) {
                        if (id === playerId) {
                            this.score = data[id].score || 0;
                            this.scoreText.setText(`АВТОРИТЕТ: ${this.score}`);
                        } else {
                            this.oppScore = data[id].score || 0;
                            this.oppScoreText.setText(`СОПЕРНИК: ${this.oppScore}`);
                        }
                    }
                    if (this.score >= 3000) this.endGame(playerId);
                });
            }

            generateAlphabetGrid() {
                const abc = "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";
                let letters = (abc + abc).split('');
                for (let i = letters.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [letters[i], letters[j]] = [letters[j], letters[i]];
                }
                return letters.join('');
            }

            createGrid(str) {
                const startX = 135, startY = 500, step = 115;
                for (let i = 0; i < 64; i++) {
                    let r = Math.floor(i / 8), c = i % 8;
                    let x = startX + c * step, y = startY + r * step;
                    
                    // Рисуем плитку программно
                    let rect = this.add.rectangle(x, y, 105, 105, THEME.tile).setInteractive();
                    let txt = this.add.text(x, y, str[i], { fontSize: '45px', fontStyle: 'bold' }).setOrigin(0.5);
                    
                    rect.setData('index', i);
                    rect.setData('char', str[i]);
                    this.tileObjects[i] = { rect, txt };

                    rect.on('pointerdown', () => this.handleTap(i));
                }
            }

            handleTap(idx) {
                if (this.isGameOver) return;
                const pos = this.selectedIndices.indexOf(idx);
                const obj = this.tileObjects[idx];

                if (pos === -1) {
                    this.selectedIndices.push(idx);
                    this.currentWord += obj.rect.getData('char');
                    obj.rect.setStrokeStyle(4, 0x00ffff);
                } else if (pos === this.selectedIndices.length - 1) {
                    this.selectedIndices.pop();
                    this.currentWord = this.currentWord.slice(0, -1);
                    obj.rect.setStrokeStyle(0);
                }
                this.wordDisplay.setText(this.currentWord);
                this.updateVisuals();
            }

            checkWord() {
                if (this.currentWord.length < 2) return;
                
                const w = this.currentWord;
                if (this.usedWords.has(w)) { this.flashMsg("БЫЛО"); return; }

                // Пока нет словаря, считаем любое слово > 2 букв верным
                this.usedWords.add(w);
                let bonus = 1;
                this.selectedIndices.forEach(idx => {
                    if (this.tilesOwner[idx] && this.tilesOwner[idx] !== playerId) bonus = 2;
                });

                const points = w.length * 100 * bonu


s;
                const newOwnership = {...this.tilesOwner};
                this.selectedIndices.forEach(idx => { newOwnership[idx] = playerId; });

                database.ref(`${this.roomPath}/ownership`).set(newOwnership);
                database.ref(`${this.roomPath}/players/${playerId}`).update({ score: this.score + points });
                
                this.flashMsg(bonus > 1 ? `ПЕРЕХВАТ! +${points}` : `+${points}`);
                this.resetTurn();
            }

            updateVisuals() {
                for (let i = 0; i < 64; i++) {
                    const owner = this.tilesOwner[i];
                    const obj = this.tileObjects[i];
                    if (!obj) continue;

                    if (this.selectedIndices.includes(i)) {
                        obj.rect.setFillStyle(0x444444);
                    } else if (owner === playerId) {
                        obj.rect.setFillStyle(THEME.self);
                    } else if (owner) {
                        obj.rect.setFillStyle(THEME.opp);
                    } else {
                        obj.rect.setFillStyle(THEME.tile);
                    }
                }
            }

            resetTurn() {
                this.selectedIndices.forEach(idx => this.tileObjects[idx].rect.setStrokeStyle(0));
                this.selectedIndices = [];
                this.currentWord = "";
                this.wordDisplay.setText("");
                this.updateVisuals();
            }

            flashMsg(m) {
                const t = this.add.text(540, 400, m, { fontSize: '60px', fontStyle: 'bold', backgroundColor: '#000' }).setOrigin(0.5);
                this.tweens.add({ targets: t, alpha: 0, y: 200, duration: 1500, onComplete: () => t.destroy() });
            }

            endGame(winnerId) {
                this.isGameOver = true;
                const win = winnerId === playerId;
                this.add.rectangle(540, 960, 1080, 1920, 0x000000, 0.8);
                this.add.text(540, 800, win ? "РАЙОН ТВОЙ" : "ВЫТЕСНИЛИ", { fontSize: '100px', fill: win ? '#00ff00' : '#ff0000' }).setOrigin(0.5);
                const re = this.add.text(540, 1100, 'ЗАНОВО', { fontSize: '60px' }).setOrigin(0.5).setInteractive();
                re.on('pointerdown', () => {
                    database.ref(this.roomPath).remove().then(() => window.location.reload());
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 1080, height: 1920,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: [MenuScene, MainScene]
        };
        new Phaser.Game(config);
    </script>
</body>
</html>
